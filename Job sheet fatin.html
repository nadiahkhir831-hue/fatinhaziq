<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fatin Job Sheet</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: white;
    overflow: hidden;
    background: linear-gradient(135deg,#000000,#0f0c29,#302b63,#24243e);
}

/* Canvas for stars */
#space {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
}

/* Heading */
h1 {
    text-align: center;
    font-size: 42px;
    letter-spacing: 2px;
    margin: 40px 0;
}

/* Jobsheet container */
.jobsheet {
    width: 280px; /* smaller width */
    margin: 0 auto;
    padding: 50px;

    border-radius: 20px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);
    box-shadow: 0 0 25px rgba(255,255,255,0.2);
    display: flex;
    flex-direction: column;
    gap: 12px;
    text-align: center;
}

/* Job sheet buttons - short width */
.jobsheet a {
    display: inline-block;
    min-width: 100px;  
    text-decoration: none;
    background: white;
    color: #2575fc;
    font-weight: bold;
    padding: 10px 20px;
    border-radius: 10px;
    transition: 0.3s;
    box-shadow: 0 0 8px rgba(255,255,255,0.3);
}

.jobsheet a:hover {
    background: #2575fc;
    color: rgb(131, 75, 210);
    box-shadow: 0 0 16px rgba(77, 28, 137, 0.8);
    transform: translateY(-2px);
}

/* Back Button */
.back {
    position: absolute;
    top: 20px;
    right: 20px;
    text-decoration: none;
    background: #3e16c2;
    color: black;
    padding: 10px 18px;
    border-radius: 10px;
    font-size: 14px;
    transition: 0.3s;
}

.back:hover {
    background: #1b5e20;
    transform: translateY(-2px);
}
</style>
</head>
<body>

<canvas id="space"></canvas>

<h1>Fatin's JobSheets</h1>

<div class="jobsheet">
    <a href="Job sheet 1.html">JOB SHEET 1</a>
    <a href="Job sheet 2.html">JOB SHEET 2</a>
    <a href="Job sheet 3.html">JOB SHEET 3</a>
    <a href="job sheet 4.html">JOB SHEET 4</a>
    <a href="Job sheet 5.html">JOB SHEET 5</a>
    <a href="Job sheet 6.html">JOB SHEET 6</a>
</div>

<a href="about.html" class="back">Back</a>

<script>
const canvas = document.getElementById("space");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];

// Create blinking stars
for(let i=0;i<150;i++){
    stars.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        radius:Math.random()*1.5,
        alpha:Math.random(),
        speed:Math.random()*0.02
    });
}

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    stars.forEach(star=>{
        star.alpha += star.speed;
        if(star.alpha<=0 || star.alpha>=1) star.speed = -star.speed;

        ctx.beginPath();
        ctx.arc(star.x,star.y,star.radius,0,Math.PI*2);
        ctx.fillStyle = "rgba(255,255,255,"+star.alpha+")";
        ctx.fill();
    });
    requestAnimationFrame(animate);
}

animate();

window.addEventListener("resize",()=>{
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});
</script>

</body>
</html>
