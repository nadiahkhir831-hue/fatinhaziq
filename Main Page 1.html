<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Main Page</title>
    <style>
        /* Universal reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: #0a0a0a; /* dark background for neon effect */
            color: #fff;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            text-align: center;
            padding: 40px 20px;
            background-color: #111;
            box-shadow: 0 0 20px #00fff0;
        }

        header h1 {
            font-size: 3em;
            color: #00fff0;
            text-shadow: 0 0 10px #00fff0, 0 0 20px #00fff0;
        }

        nav {
            margin-top: 15px;
        }

        nav a {
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
            color: #ff00ff;
            text-shadow: 0 0 5px #ff00ff, 0 0 10px #ff00ff;
            transition: color 0.3s;
        }

        nav a:hover {
            color: #00ff00;
            text-shadow: 0 0 10px #00ff00, 0 0 20px #00ff00;
        }

        main {
            flex: 1;
            padding: 40px 20px;
            text-align: center;
        }

        main h2 {
            font-size: 2em;
            color: #ff00ff;
            text-shadow: 0 0 10px #ff00ff, 0 0 20px #ff00ff;
            margin-bottom: 20px;
        }

        main p {
            font-size: 1.2em;
            color: #00fff0;
            text-shadow: 0 0 5px #00fff0;
            line-height: 1.8;
            max-width: 700px;
            margin: 0 auto 20px auto;
        }

        footer {
            text-align: center;
            padding: 20px;
            background-color: #111;
            box-shadow: 0 -0 20px #ff00ff;
            color: #ff00ff;
            text-shadow: 0 0 5px #ff00ff, 0 0 10px #ff00ff;
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to our JobSheet Weabsite Submit</h1>
        <nav>
            
            <a href="about.html">About Us</a>
        </nav>
    </header>

    <main>
        <p>
            This is our JobSheet submittion website.
        </p>
        <p>
            We created this website to show our progress 
            for our lecturers. This helps prevent lost assignments and 
            keeps the submission process more organized.
        </p>
    </main>

    <footer>
    </footer>
</body>
</html>
