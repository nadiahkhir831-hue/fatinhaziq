<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Shopping Cart</title>
<link rel="stylesheet" href="js9.css">
</head>

<body>

<div class="container">
    <h2>SHOPPING CART</h2>

    <table>
        <thead>
            <tr>
                <th>Product</th>
                <th>#</th>
                <th>Price</th>
                <th>Amount</th>
            </tr>
        </thead>

        <tbody id="cart-body">
            <tr>
                <td>iPhone</td>
                <td><input type="number" value="1" class="qty"></td>
                <td class="price">3000</td>
                <td class="amount">3000</td>
            </tr>

            <tr>
                <td>Headphones</td>
                <td><input type="number" value="1" class="qty"></td>
                <td class="price">200</td>
                <td class="amount">200</td>
            </tr>
        </tbody>
    </table>

    <div class="summary">
        <p>Subtotal: <span id="subtotal">0</span></p>
        <p>Tax: <span id="tax">0</span></p>
        <p>Shipping: <span id="shipping">50</span></p>
        <p class="total">Grand Total: <span id="grandtotal">0</span></p>
    </div>

</div>

<script src="script9.js"></script>
</body>
</html>
