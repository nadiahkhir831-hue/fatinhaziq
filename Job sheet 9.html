<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Shopping Cart</title>
<link rel="stylesheet" href="js9.css">
</head>

<body>

<div class="container">
    <h2>SHOPPING CART</h2>

    <table>
        <thead>
            <tr>
                <th colspan="2">Product</th>
                <th>#</th>
                <th>Price</th>
                <th>Amount</th>
            </tr>
        </thead>

        <tbody id="cart-body">

            <tr>
                <td><img src="_Girl_with_a_Pearl_Earring.jpg"></td>
                <td>Girl with a Pearl Earring</td>
                <td><input type="number" value="3" class="qty"></td>
                <td class="price">80</td>
                <td class="amount"></td>
            </tr>

            <tr>
                <td><img src="artist holding a thistle.jpg"></td>
                <td>Artist Holding a Thistle</td>
                <td><input type="number" value="1" class="qty"></td>
                <td class="price">125</td>
                <td class="amount"></td>
            </tr>

            <tr>
                <td><img src="Portrait of Eleanor of Toledo.jpg"></td>
                <td>Portrait of Eleanor of Toledo</td>
                <td><input type="number" value="2" class="qty"></td>
                <td class="price">75</td>
                <td class="amount"></td>
            </tr>

        </tbody>
    </table>

    <div class="summary">
        <p>Subtotal <span id="subtotal"></span></p>
        <p>Tax <span id="tax"></span></p>
        <p>Shipping <span id="shipping">RM40.00</span></p>
        <p class="total">Grand Total <span id="grandtotal"></span></p>
    </div>

</div>

<script src="script9.js"></script>
</body>
</html>
