<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>About Us</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    color:white;
    overflow:hidden;
    background:linear-gradient(135deg,#000000,#0f0c29,#302b63,#24243e);
}

/* HOME BUTTON - STYLE MACAM FATIN PAGE */
.home-btn{
    position:absolute;
    top:20px;
    right:20px;
    text-decoration:none;
    background:#3e16c2;
    color:black;
    padding:10px 18px;
    border-radius:10px;
    font-size:14px;
    transition:0.3s;
}

.home-btn:hover{
    background:#1b5e20;
    transform:translateY(-2px);
}

/* CANVAS BACKGROUND */
#space{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:-1;
}

/* CONTENT */
.about-section{
    min-height:100vh;
    padding:60px 20px;
    text-align:center;
}

h1{
    font-size:45px;
    letter-spacing:3px;
    margin-bottom:50px;
}

.card-container{
    display:flex;
    justify-content:center;
    gap:60px;
    flex-wrap:wrap;
}

.flip-card{
    width:240px;
    height:340px;
    perspective:1000px;
}

.flip-card-inner{
    width:100%;
    height:100%;
    position:relative;
    transition:0.8s;
    transform-style:preserve-3d;
}

.flip-card:hover .flip-card-inner{
    transform:rotateY(180deg);
}

.flip-card-front,
.flip-card-back{
    position:absolute;
    width:100%;
    height:100%;
    border-radius:20px;
    backface-visibility:hidden;
    padding:20px;
    box-sizing:border-box;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(10px);
    box-shadow:0 0 25px rgba(255,255,255,0.2);
}

.flip-card-front img{
    width:100px;
    height:100px;
    border-radius:50%;
    margin-top:20px;
}

.flip-card-back{
    transform:rotateY(180deg);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

/* BUTTON STYLE */
.view-btn{
    text-decoration:none;
    background:white;
    color:#2575fc;
    padding:10px 18px;
    border-radius:10px;
    font-weight:bold;
    margin-top:10px;
}

.whatsapp-btn{
    text-decoration:none;
    background:#25D366;
    color:white;
    padding:6px 12px;
    border-radius:8px;
    font-size:13px;
    margin-top:8px;
}
</style>
</head>

<body>

<canvas id="space"></canvas>

<!-- HOME BUTTON -->
<a href="Main Page 1.html" class="home-btn">Home</a>

<section class="about-section">
<h1>Our Team</h1>

<div class="card-container">

<!-- CARD 1 -->
<div class="flip-card">
<div class="flip-card-inner">

<div class="flip-card-front">
<img src="haziq.jpeg">
<h3>Mohd Haziq</h3>
</div>

<div class="flip-card-back">
<a href="Job sheet haziq.html" class="view-btn">View Job Sheet</a>
<a href="https://wa.me/601121906304" target="_blank" class="whatsapp-btn">
WhatsApp
</a>
</div>

</div>
</div>

<!-- CARD 2 -->
<div class="flip-card">
<div class="flip-card-inner">

<div class="flip-card-front">
<img src="fatin.jpeg">
<h3>Nurfatin Nadiah</h3>
</div>

<div class="flip-card-back">
<a href="Job sheet fatin.html" class="view-btn">View Job Sheet</a>
<a href="https://wa.me/601117761233" target="_blank" class="whatsapp-btn">
WhatsApp
</a>
</div>

</div>
</div>

</div>
</section>

<script>
const canvas = document.getElementById("space");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];

for(let i=0;i<150;i++){
    stars.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        radius:Math.random()*1.5,
        alpha:Math.random(),
        speed:Math.random()*0.02
    });
}

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    stars.forEach(star=>{
        star.alpha += star.speed;
        if(star.alpha<=0 || star.alpha>=1) star.speed = -star.speed;

        ctx.beginPath();
        ctx.arc(star.x,star.y,star.radius,0,Math.PI*2);
        ctx.fillStyle = "rgba(255,255,255,"+star.alpha+")";
        ctx.fill();
    });

    requestAnimationFrame(animate);
}

animate();

window.addEventListener("resize",()=>{
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});
</script>

</body>
</html>
