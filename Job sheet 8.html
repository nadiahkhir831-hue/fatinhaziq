<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Edit Art Work</title>
<link rel="stylesheet" href="js8.css">
</head>

<body>

<div class="form-container">
    <h1>Edit Art Work Details</h1>

    <form id="artForm">

        <label>Title</label>
        <div class="input-group">
            <input type="text" id="title">
            <span class="error-icon">!</span>
        </div>

        <label>Description</label>
        <div class="input-group">
            <textarea id="description"></textarea>
            <span class="error-icon">!</span>
        </div>

        <div class="row">
            <div class="left">

                <label>Genre</label>
                <select>
                    <option>Choose genre</option>
                </select>

                <label>Subject</label>
                <select>
                    <option>Choose subject</option>
                </select>

                <label>Medium</label>
                <input type="text">

                <label>Year</label>
                <div class="input-group small">
                    <input type="text" id="year">
                    <span class="error-icon">!</span>
                </div>

                <label>Museum</label>
                <input type="text">

            </div>

             <!-- RIGHT -->
         <div class="right">

            <fieldset>
                <legend>Type</legend>

                <label><input type="radio" name="type" checked> Painting</label><br>
                <label><input type="radio" name="type"> Sculpture</label>
            </fieldset>

            <fieldset>
                <legend>Image Creative Commons Specification</legend>

                <label><input type="checkbox"> Attribution</label><br>
                <label><input type="checkbox"> Noncommercial</label><br>
                <label><input type="checkbox"> No Derivative Works</label><br>
                <label><input type="checkbox"> Share Alike</label>
            </fieldset>

            <!-- <fieldset>
    <legend>Image Creative Commons Specification</legend>

    <label>
        <input type="checkbox"> Attribution
    </label><br>

    <label>
        <input type="checkbox"> Noncommercial
    </label><br>

    <label>
        <input type="checkbox"> No Derivative Works
    </label><br>

    <label>
        <input type="checkbox"> Share Alike
    </label>
</fieldset> -->
                </div>
            </div>
        </div>

        <div class="buttons">
            <button type="submit">Submit</button>
            <button type="reset">Clear Form</button>
        </div>

    </form>
</div>

<script src="script8.js"></script>
</body>
</html>
