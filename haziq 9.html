<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Diecast Shopping Cart</title>
<link rel="stylesheet" href="shoppingcart.css">
</head>

<body>
<div class="container">
    <h2>Diecast Shopping Cart</h2>

    <table>
        <thead>
            <tr>
                <th colspan="2">Product</th>
                <th>Qty</th>
                <th>Price (RM)</th>
                <th>Amount (RM)</th>
            </tr>
        </thead>

        <tbody id="cart-body">
            <tr>
                <td><img src="DodgeViperACR.jpg.jpeg" alt="Dodge Viper ACR Extreme Aero"></td>
                <td>Dodge Viper ACR Extreme Aero</td>
                <td><input type="number" value="2" class="qty"></td>
                <td class="price">39.90</td>
                <td class="amount"></td>
            </tr>

            <tr>
                <td><img src="NissanZ.jpg.jpeg" alt="Nissan Z Performance"></td>
                <td>Nissan Z Performance</td>
                <td><input type="number" value="1" class="qty"></td>
                <td class="price">40</td>
                <td class="amount"></td>
            </tr>

            <tr>
                <td><img src="KoenigseggJesko.jpg.jpeg" alt="Koenigsegg Jesko Attack"></td>
                <td>Koenigsegg Jesko Attack</td>
                <td><input type="number" value="3" class="qty"></td>
                <td class="price">35</td>
                <td class="amount"></td>
            </tr>
        </tbody>
    </table>

    <div class="summary">
        <p>Subtotal <span id="subtotal"></span></p>
        <p>Tax (6%) <span id="tax"></span></p>
        <p>Shipping <span id="shipping">RM40.00</span></p>
        <p class="total">Grand Total <span id="grandtotal"></span></p>
    </div>
</div>

<script src="shoppingcart.js"></script>
</body>
</html>
