<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Haziq's Job sheet</title>

<style>
*{
    box-sizing:border-box;
    margin:0;
    padding:0;
}

body {
    font-family: Arial, sans-serif;
    color: white;
    min-height: 100vh;
    overflow: hidden;
    background: linear-gradient(135deg,#000000,#0f0c29,#302b63,#24243e);
}

/* Canvas for stars */
#space {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
}

/* Navbar */
.navbar {
    display:flex;
    justify-content:flex-end; /* Logo dah tiada, align kanan */
    align-items:center;
    padding:15px 30px;
    background:rgba(0,0,0,0.5);
    backdrop-filter:blur(10px);
}

nav a{
    text-decoration:none;
    color:white;
    padding:6px 12px;
    border-radius:8px;
    transition:0.3s;
}

nav a.active{
    background:#3e16c2;
    color:black;
}

nav a:hover{
    background:#1b5e20;
}

/* Container */
.container{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
    padding:80px 20px 60px;
}

/* SEMUA CARD SAMA SAIZ 220px */
.card{
    width:220px;
    height:160px;
    padding:15px;
    border-radius:20px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(10px);
    box-shadow:0 0 25px rgba(255,255,255,0.2);
    text-align:center;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
}

.card h3{
    margin-bottom:8px;
    font-size:16px;
}

/* Jobsheet group card */
.jobsheet-group {
    padding:12px;
}

.jobsheet-group h3 {
    margin-bottom:12px;
    font-size:18px;
}

/* Button group */
.btn-group {
    display:flex;
    flex-direction:column;
    gap:4px;
}

.btn-group .btn-show {
    padding:6px 12px;
    font-size:14px;
}

/* Button TUNGGAL */
.card:not(.jobsheet-group) .btn-show {
    padding:6px 12px;
    font-size:14px;
    width:100%;
}

/* Button SAME STYLE AS HAZIQ */
.btn-show{
    background:white;
    color:#2575fc;
    font-weight:bold;
    border-radius:10px;
    border:none;
    cursor:pointer;
    transition:0.3s;
    box-shadow:0 0 8px rgba(255,255,255,0.3);
    text-decoration:none; /* BUANG LINE BAWAH */
}

.btn-show:hover{
    background:#2575fc;
    color:rgb(131,75,210);
    box-shadow:0 0 16px rgba(77,28,137,0.8);
    transform:translateY(-2px);
}

/* Responsive */
@media(max-width:768px){
    .card{
        width:45%;
        height:150px;
    }
    .container {
        padding:60px 10px 40px;
    }
}

@media(max-width:480px){
    .card{
        width:90%;
        height:140px;
    }
    .container {
        padding:50px 10px 30px;
    }
}
</style>
</head>
<body>

<canvas id="space"></canvas>

<header>
    <div class="navbar">
        <!-- LOGO DIHAPUSKAN -->
        <nav>
            <a href="about.html" class="active">Back</a>
        </nav>
    </div>
</header>

<main>
    <div class="container">
        <!-- HTML GROUP -->
        <div class="card jobsheet-group">
            <h3>HTML</h3>
            <div class="btn-group">
                <a href="my travels.html" class="btn-show">Jobsheet 1</a>
                <a href="haziq 2.html" class="btn-show">Jobsheet 2</a>
                <a href="haziq 3.html" class="btn-show">Jobsheet 3</a>
            </div>
        </div>

        <!-- CSS GROUP -->
        <div class="card jobsheet-group">
            <h3>CSS</h3>
            <div class="btn-group">
                <a href="haziq 4.html" class="btn-show">Jobsheet 4</a>
                <a href="haziq 5.html" class="btn-show">Jobsheet 5</a>
                <a href="haziq 6.html" class="btn-show">Jobsheet 6</a>
            </div>
        </div>

        <!-- CSS GROUP -->
        <div class="card jobsheet-group">
            <h3>JAVA SCRIPT</h3>
            <div class="btn-group">
                <a href="haziq 7.html" class="btn-show">Jobsheet 7</a>
                <a href="haziq 8.html" class="btn-show">Jobsheet 8</a>
                <a href="haziq 9.html" class="btn-show">Jobsheet 9</a>
            </div>
        </div>

        <!-- SINGLE BUTTON
        <div class="card">
            <h3>Jobsheet 7</h3>
            <button class="btn-show">Show</button>
        </div>
        <div class="card">
            <h3>Jobsheet 8</h3>
            <button class="btn-show">Show</button>
        </div>
        <div class="card">
            <h3>Jobsheet 9</h3>
            <button class="btn-show">Show</button>
        </div>
    </div> -->
</main>

<script>
const canvas=document.getElementById("space");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let stars=[];
for(let i=0;i<150;i++){
    stars.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        radius:Math.random()*1.5,
        alpha:Math.random(),
        speed:Math.random()*0.02
    });
}

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    stars.forEach(star=>{
        star.alpha+=star.speed;
        if(star.alpha<=0||star.alpha>=1) star.speed=-star.speed;
        ctx.beginPath();
        ctx.arc(star.x,star.y,star.radius,0,Math.PI*2);
        ctx.fillStyle="rgba(255,255,255,"+star.alpha+")";
        ctx.fill();
    });
    requestAnimationFrame(animate);
}
animate();

window.addEventListener("resize",()=>{
    canvas.width=window.innerWidth;
    canvas.height=window.innerHeight;
});
</script>

</body>
</html>
