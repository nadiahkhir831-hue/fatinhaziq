<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Main Page</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    color:white;
    display:flex;
    flex-direction:column;
    min-height:100vh;
    background:linear-gradient(135deg,#000000,#0f0c29,#302b63,#24243e);
}

/* CANVAS BACKGROUND */
#space{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:-1;
}

/* HEADER */
header{
    text-align:center;
    padding:40px 20px;
    background:rgba(0,0,0,0.5);
    backdrop-filter:blur(10px);
    box-shadow:0 0 20px #00fff0;
}

header h1{
    font-size:3em;
    color:#00fff0;
    text-shadow:0 0 10px #00fff0, 0 0 20px #00fff0;
}

/* NAV */
nav{
    margin-top:15px;
}

nav a{
    text-decoration:none;
    margin:0 15px;
    font-weight:bold;
    color:#ff00ff;
    text-shadow:0 0 5px #ff00ff, 0 0 10px #ff00ff;
    transition:0.3s;
}

nav a:hover{
    color:#00ff00;
    text-shadow:0 0 10px #00ff00, 0 0 20px #00ff00;
}

/* MAIN */
main{
    flex:1;
    padding:40px 20px;
    text-align:center;
}

main h2{
    font-size:2em;
    color:#ff00ff;
    text-shadow:0 0 10px #ff00ff, 0 0 20px #ff00ff;
    margin-bottom:20px;
}

main p{
    font-size:1.2em;
    color:#00fff0;
    text-shadow:0 0 5px #00fff0;
    line-height:1.8;
    max-width:700px;
    margin:0 auto 20px auto;
}

/* FOOTER */
footer{
    text-align:center;
    padding:20px;
    background:rgba(0,0,0,0.5);
    backdrop-filter:blur(10px);
    box-shadow:0 -0 20px #ff00ff;
    color:#ff00ff;
    text-shadow:0 0 5px #ff00ff, 0 0 10px #ff00ff;
}
</style>
</head>

<body>

<!-- BACKGROUND ANIMATION -->
<canvas id="space"></canvas>

<header>
    <h1>Welcome to our JobSheet Website Submit</h1>
    <nav>
        <a href="about.html">About Us</a>
    </nav>
</header>

<main>
    <h2>Introduction</h2>
    <p>
        This is our JobSheet submission website.
    </p>
    <p>
        We created this website to show our progress 
        for our lecturers. This helps prevent lost assignments and 
        keeps the submission process more organized.
    </p>
</main>

<footer>
    <p>© 2026 JobSheet Website</p>
</footer>

<!-- STAR ANIMATION SCRIPT -->
<script>
const canvas = document.getElementById("space");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];

for(let i=0;i<150;i++){
    stars.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        radius:Math.random()*1.5,
        alpha:Math.random(),
        speed:Math.random()*0.02
    });
}

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    stars.forEach(star=>{
        star.alpha += star.speed;
        if(star.alpha<=0 || star.alpha>=1) star.speed = -star.speed;

        ctx.beginPath();
        ctx.arc(star.x,star.y,star.radius,0,Math.PI*2);
        ctx.fillStyle = "rgba(255,255,255,"+star.alpha+")";
        ctx.fill();
    });

    requestAnimationFrame(animate);
}

animate();

window.addEventListener("resize",()=>{
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});
</script>

</body>
</html>
