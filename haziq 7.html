<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Share Your Travels</title>
    <link rel="stylesheet" href="travelstyle.css">
</head>

<body>

<header>
    <div class="logo">Share Your Travels</div>
    <div class="menu">☰</div>
</header>

<div class="container">

    <!-- Featured Image -->
    <figure id="featured" class="main-image">
        <img src="mount-kinabalu.jpg" title="Mount Kinabalu" alt="Mount Kinabalu">
        <figcaption class="caption"></figcaption>
    </figure>

    <!-- Thumbnails -->
    <div id="thumbnails" class="gallery">
        <img src="kinabalu-park.jpg" title="World Heritage Site" alt="">
        <img src="sepilok-orangutan-centre.jpg" title="Rehabilitation Centre" alt="">
        <img src="sipadan-island.jpg" title="Sipadan Island" alt="">
        <img src="marine-park.jpg" title="Tunku Abdul Rahman Marine Park" alt="">
        <img src="danum-valley.jpg" title="Conservation Area" alt="">
    </div>

</div>

<script src="travel.js"></script>

</body>
</html>
