<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Share Your Travels</title>
    <link rel="stylesheet" href="travelstyle.css">
</head>

<body>

<header>
    <div class="logo">Share Your Travel</div>
    <div class="menu">☰</div>
</header>

<div class="container">

    <!-- Main Image -->
    <div class="main-image">
        <img id="featured-image" src="mount-kinabalu.jpg" alt="Mount Kinabalu">
    </div>

    <!-- Gallery -->
    <div class="gallery">
        <img src="kinabalu-park.jpg" title="World Heritage Site" alt="Kinabalu Park">
        <img src="sepilok-orangutan-centre.jpg" title="Rehabilitation Centre" alt="Sepilok Orangutan Centre">
        <img src="sipadan-island.jpg" title="Sipadan Island" alt="Sipadan Island">
        <img src="marine-park.jpg" title="Tunku Abdul Rahman Marine Park" alt="Marine Park">
        <img src="danum-valley.jpg" title="Conservation Area" alt="Danum Valley">
    </div>

</div>

<script src="travel.js"></script>

</body>
</html>
