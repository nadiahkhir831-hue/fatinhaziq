<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Share Your Travels</title>
  <link rel="stylesheet" href="stylefatin.css">
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
</head>
<body>

<header>
  <h1>Share Your Travels</h1>
  <div class="menu-icon">&#9776;</div>
</header>

<main class="container">
  
  <!-- Main Image -->
  <div class="main-image">
    <img id="displayedImage" src="colosseum.jpg" alt="Ancient Amphitheater">
    <p id="caption" class="caption">Ancient Amphitheater</p>
  </div>

  <!-- Thumbnail Gallery -->
  <div class="thumbnail-container">
    <img src="colosseum.jpg" data-full="colosseum.jpg" data-caption="Ancient Amphitheater">
    <img src="trevi-fountain.jpg" data-full="trevi-fountain.jpg" data-caption="Famous fountain">
    <img src="Pantheon.jpg" data-full="Pantheon.jpg" data-caption="Pantheon">
    <img src="vatican-museums.jpg" data-full="vatican-museums.jpg" data-caption="Museums">
    <img src="Piazza-Navona.jpg" data-full="Piazza-Navona.jpg" data-caption="Baroque art">
  </div>

</main>

<script>
const displayedImage = document.getElementById('displayedImage');
const caption = document.getElementById('caption');
const thumbnails = document.querySelectorAll('.thumbnail-container img');

thumbnails.forEach(thumb => {
  thumb.addEventListener('click', () => {
    displayedImage.src = thumb.dataset.full;
    caption.textContent = thumb.dataset.caption;
  });
});
</script>

</body>
</html>
